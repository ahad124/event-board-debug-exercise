services:
  # ---------- SQL Server ----------
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: eventboard-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:-EventBoard_Db!Passw0rd}"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  # ---------- Backend API ----------
  api:
    build:
      context: .
      dockerfile: EventBoard.Api/Dockerfile
    container_name: eventboard-api
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=EventBoardDb;User Id=sa;Password=${MSSQL_SA_PASSWORD:-EventBoard_Db!Passw0rd};TrustServerCertificate=True;Encrypt=False"
      Jwt__Key: "${JWT_KEY:-ThisIsADevelopmentSecretKeyThatIsAtLeast32BytesLong!}"
      Jwt__Issuer: "EventBoard.Api"
      Jwt__Audience: "EventBoard.Client"
      OpenWeather__BaseUrl: "https://api.openweathermap.org"
      OpenWeather__ApiKey: "${OPENWEATHER_API_KEY:-}"
      Cors__AllowedOrigins__0: "http://localhost"
    ports:
      - "8080:8080"
    volumes:
      - uploads_data:/app/wwwroot/uploads

  # ---------- Frontend (Nginx) ----------
  frontend:
    build:
      context: ./event-board-frontend
      dockerfile: Dockerfile
    container_name: eventboard-frontend
    depends_on:
      - api
    ports:
      - "80:80"

volumes:
  mssql_data:
  uploads_data:
